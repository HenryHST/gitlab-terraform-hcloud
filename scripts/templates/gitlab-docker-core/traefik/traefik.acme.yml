entryPoints:
  ping:
    address: ":88"
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: hetzner
  traefik:
    address: ":8080"
ping:
  entryPoint: "ping"
certificatesResolvers:
  hetzner:
    acme:
      email: "${ACME_EMAIL}"
      storage: "/certs/acme_letsencrypt.json"
      dnsChallenge:
        provider: "hetzner"
        resolvers:
          - "helium.ns.hetzner.de"
          - "oxygen.ns.hetzner.com"
        delayBeforeCheck: 30s
  tls:
    acme:
      email: "${ACME_EMAIL}"
      storage: "/certs/tls_letsencrypt.json"
      tlsChallenge: {}
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    allowEmptyServices: true
    network: proxy
    watch: true
  file:
    directory: /etc/traefik/dynamic_conf
    watch: true
  providersThrottleDuration: 10s
global:
  sendAnonymousUsage: false
  checkNewVersion: true
api:
  dashboard: true
  insecure: true
  debug: false
experimental:
  plugins:
    fail2ban:
      moduleName: "github.com/tomMoulard/fail2ban"
      version: "v0.8.9"
    sablier:
      moduleName: "github.com/sablierapp/sablier"
      version: "v1.10.1"
metrics:
  prometheus:
    addRoutersLabels: true
log:
  level: DEBUG
  filePath: "/var/log/traefik/traefik.log"
  format: json
  maxSize: 10
  maxBackups: 10
  maxAge: 14
accessLog:
  filePath: "/var/log/traefik/access.log"
  format: common
  bufferingSize: 50
  fields:
    defaultMode: keep
serversTransport:
  insecureSkipVerify: true
